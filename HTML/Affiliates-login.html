<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../CSS/Affiliates-login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliates-Login</title>
    <link rel="icon" type="image/svg+xml" href="../Multimedia/images/fiverr-tab-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <!--======== HEADER SECTION ========-->

    <div class="flex-wrap">
        <div class="item1">
            <header>
                <img src="../Multimedia/images/Affil-login-logo.png" alt="">
            </header>

            <div class="login-cont">
                <h1>
                    Login to your Affiliate account
                </h1>

                <form action="">
                    <label for="name">Username</label>
                    <div class="in1"><input type="text" placeholder="Your username"></div>

                    <label for="name">Password</label>
                    <div class="in1"><input type="password" placeholder="Your password"></div>


                    <div class="sub-flex">
                        <div>
                            <input type="radio">
                            <label for="remember">Remember me</label>
                        </div>

                        <div>
                            <a href="#">
                                Forgot password?
                            </a>
                        </div>
                    </div>

                    <div class="btn">
                        <button>
                            Sign in
                        </button>
                    </div>


                    <div class="sp-tag">
                        <p>
                            Don't have an account yet? <a href="#">Sign up now</a>
                        </p>
                    </div>
                </form>

                <div class="ap-tag">
                    <p>
                        © Fiverr Int. Lmt.
                    </p>

                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms & Conditions</a>
                </div>
            </div>
        </div>


        <div class="item2">
            <div>
                <h2>
                    It pays to be a <i>Fiverr Affiliate</i>
                </h2>
            </div>

            <div class="img">
                <img src="../Multimedia/images/Affil-login-img1.png" alt="">
            </div>
        </div>
    </div>

</body>

</html>
